spring:
  config:
    activate:
      on-profile: dev
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  frontend-url: ${MT_FRONTEND_URL:http://localhost:5173}

logging:
  level:
    org:
      springframework: INFO

management:
  endpoint:
    health:
      show-details: never
